name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package Windows installer
        run: npx electron-builder --publish never

      - name: Create release and upload updater assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "Rugby Analysis Suite $tag" --notes "Desktop icon, streamlined kicking workflow, and release reliability improvements."
          }
          gh release upload $tag `
            "release/Rugby-Analysis-Suite-Setup.exe" `
            "release/Rugby-Analysis-Suite-Setup.exe.blockmap" `
            "release/latest.yml" `
            --clobber
